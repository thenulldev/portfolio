name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/dependabot.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.6.0

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure pnpm
        run: |
          pnpm config set ignore-build-scripts false
          cat ~/.config/pnpm/rc || cat ~/.pnpmrc || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache OpenNext build
        id: opennext-cache
        uses: actions/cache@v4
        with:
          path: .open-next
          key: ${{ runner.os }}-opennext-${{ hashFiles('pnpm-lock.yaml', 'next.config.*', 'wrangler.json') }}
          restore-keys: |
            ${{ runner.os }}-opennext-

      - name: Set preview environment variables
        if: github.event_name == 'pull_request'
        run: |
          echo "NEXT_PUBLIC_PREVIEW=true" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_BRANCH_NAME=${{ github.head_ref }}" >> "$GITHUB_ENV"

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: opennext-build
          path: .open-next/
          retention-days: 7

      - name: Determine deployment target
        id: deploy-target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "target=preview" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
            SAFE_BRANCH=$(echo "${{ github.head_ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c1-28)
            echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "safe_branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Workers (Production)
        if: steps.deploy-target.outputs.target == 'production'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy to Cloudflare Workers (Preview)
        if: steps.deploy-target.outputs.target == 'preview'
        id: preview-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name portfolio-preview-${{ steps.deploy-target.outputs.safe_branch }}

      - name: Create GitHub Deployment (Preview)
        if: github.event_name == 'pull_request'
        id: preview-gh-deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.preview-deploy.outputs.deployment-url }}';
            const safeBranch = '${{ steps.deploy-target.outputs.safe_branch }}';
            const fallbackUrl = `https://portfolio-preview-${safeBranch}.thenulldev.workers.dev`;
            const url = deployUrl || fallbackUrl;
            
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `preview-${safeBranch}`,
              auto_merge: false,
              required_contexts: [],
              description: `Preview deployment for branch ${safeBranch}`,
              transient_environment: true,
              production_environment: false,
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'success',
              environment: `preview-${safeBranch}`,
              environment_url: url,
              log_url: `https://dash.cloudflare.com/?to=/:account/workers-and-pages/overview`,
            });

      - name: Create GitHub Deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Cloudflare Workers deployment'
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'success',
              environment: 'production',
              environment_url: 'https://portfolio.thenulldev.workers.dev',
              log_url: `https://dash.cloudflare.com/?to=/:account/workers-and-pages/overview`
            });

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.preview-deploy.outputs.deployment-url }}';
            const branch = '${{ steps.deploy-target.outputs.branch }}';
            const safeBranch = '${{ steps.deploy-target.outputs.safe_branch }}';
            const fallbackUrl = `https://portfolio-preview-${safeBranch}.thenulldev.workers.dev`;
            const url = deployUrl || fallbackUrl;
            
            const body = `🚀 **Preview Deployment Ready**
            
            | Detail | Value |
            |--------|-------|
            | **Branch** | \`${branch}\` |
            | **Preview URL** | [${url}](${url}) |
            | **Status** | ✅ Live |
            | **Expires** | On PR close/merge |
            
            _This preview deployment will be automatically cleaned up when the PR is closed._`;
            
            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => c.body.includes('🚀 **Preview Deployment Ready**'));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment PR on merge deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            // Find associated PR and post deploy notification
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            
            if (pulls.length > 0) {
              const pr = pulls[0];
              const body = `✅ **Merged to Production**
            
            Changes from this PR are now live at [https://portfolio.thenulldev.workers.dev](https://portfolio.thenulldev.workers.dev)`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
